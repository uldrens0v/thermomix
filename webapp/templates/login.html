<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cookidoo – Login</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.15); width: 320px; }
    h1 { margin: 0 0 1.5rem; font-size: 1.4rem; text-align: center; color: #e2000f; }
    label { display: block; margin-bottom: .25rem; font-size: .9rem; }
    input { width: 100%; box-sizing: border-box; padding: .5rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: .6rem; background: #e2000f; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #b5000c; }
    .error { color: #e2000f; background: #ffeaea; padding: .5rem; border-radius: 4px; margin-bottom: 1rem; font-size: .85rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍳 Cookidoo Manager</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <label>Email</label>
      <input type="email" name="email" required placeholder="usuario@email.com">
      <label>Contraseña</label>
      <input type="password" name="password" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
